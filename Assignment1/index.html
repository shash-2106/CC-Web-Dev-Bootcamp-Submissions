<!DOCTYPE html>
<html>
<head>
  <title>My To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>My To-Do List</h1>
  <p>A simple app to keep track of my daily tasks</p>

  <!-- About Me -->
  <h1 style="font-size: 60px;">👩‍🎓</h1>
  <h3>Ramya S</h3>
  <p>I am a CSE student learning web development!</p>

  <!-- Tags -->
  <p>
    <span class="tag orange">Productivity</span>
    <span class="tag green">Daily Tasks</span>
    <span class="tag violet">Assignment</span>
  </p>

  <br>

  <!-- Input -->
  <input type="text" id="taskInput" placeholder="Enter a task" />
  <button onclick="addTask()">Add Task</button>

  <!-- Task List -->
  <ul id="taskList"></ul>

  <script src="script.js"></script>
</body>
</html>
