<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhiram's To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <img src="https://imgs.search.brave.com/fsNAKPEvfpjSoEy5eMt5nHNyRee42JI8JiHClH7GTuc/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly90czMu/bW0uYmluZy5uZXQv/dGg_aWQ9T0lQLlZv/Zmh1bW5VVEw4dmQ5/MkZSUHVZUEFIYUhh/JnBpZD0xNS4x" alt="Avatar" class="avatar">
        <h1>Abhiram</h1>
        <p class="bio">I am Abhiram, and this is a website to organize to-do lists.</p>
    </header>

    <main>
        <section class="info-box">
            <h2>Task Tracker</h2>
            <p>This is an app to create tasks</p>
        </section>

        <section class="todo-container">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Enter your task here">
                <button id="AddBtn">Add Task</button>
            </div>
            <ul id="taskList">
                </ul>
        </section>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
